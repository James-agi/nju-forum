limit_req_status 429;
limit_conn_status 429;

map $request_method $njuknow_write_client {
    default "";
    POST $binary_remote_addr;
    PUT $binary_remote_addr;
    PATCH $binary_remote_addr;
    DELETE $binary_remote_addr;
}

map $http_upgrade $njuknow_connection_upgrade {
    default upgrade;
    "" close;
}

limit_req_zone $binary_remote_addr zone=njuknow_auth_limit:10m rate=5r/m;
limit_req_zone $njuknow_write_client zone=njuknow_write_api_limit:10m rate=60r/m;
limit_conn_zone $binary_remote_addr zone=njuknow_conn_limit:10m;
