name: Deploy production

on:
  workflow_dispatch:
    inputs:
      run_migrations:
        description: Apply pending Prisma migrations before switching releases
        required: true
        default: true
        type: boolean

concurrency:
  group: production
  cancel-in-progress: false

jobs:
  build-and-deploy:
    if: github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: production
    permissions:
      contents: read
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/njuknow?schema=public
      NEXTAUTH_SECRET: ci-build-secret
      NEXTAUTH_URL: http://localhost:3000
      NEXT_PUBLIC_SITE_URL: https://njuknow.xyz

    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Build standalone app
        run: npm run build

      - name: Package release artifact
        run: |
          set -euo pipefail
          test -f .next/standalone/server.js

          SHORT_SHA="${GITHUB_SHA::7}"
          RELEASE_NAME="$(date +%Y%m%d%H%M%S)-${SHORT_SHA}"
          ARTIFACT="njuknow-${RELEASE_NAME}.tar.gz"

          mkdir -p deploy-bundle/.next deploy-bundle/scripts deploy-bundle/prisma deploy-bundle/public
          cp -a .next/standalone/. deploy-bundle/
          cp -a .next/static deploy-bundle/.next/static
          if [ -d public ]; then
            cp -a public/. deploy-bundle/public/
          fi
          cp -a prisma/migrations deploy-bundle/prisma/migrations
          cp -a prisma/schema.prisma deploy-bundle/prisma/schema.prisma
          cp -a package.json package-lock.json deploy-bundle/
          cp -a scripts/start-standalone.js deploy-bundle/scripts/start-standalone.js
          tar -czf "${ARTIFACT}" -C deploy-bundle .
          sha256sum "${ARTIFACT}" > "${ARTIFACT}.sha256"

          echo "RELEASE_NAME=${RELEASE_NAME}" >> "${GITHUB_ENV}"
          echo "ARTIFACT=${ARTIFACT}" >> "${GITHUB_ENV}"

      - name: Prepare SSH
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_PORT: ${{ secrets.SERVER_PORT }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
          SERVER_SSH_KEY: ${{ secrets.SERVER_SSH_KEY }}
          SERVER_SSH_KNOWN_HOSTS: ${{ secrets.SERVER_SSH_KNOWN_HOSTS }}
        run: |
          set -euo pipefail
          test -n "${SERVER_HOST}"
          test -n "${SERVER_SSH_KEY}"
          test -n "${SERVER_SSH_KNOWN_HOSTS}"

          PORT="${SERVER_PORT:-22}"
          USER="${SERVER_USER:-admin}"
          umask 077
          mkdir -p ~/.ssh
          printf '%s\n' "${SERVER_SSH_KEY}" > ~/.ssh/njuknow_deploy_key
          printf '%s\n' "${SERVER_SSH_KNOWN_HOSTS}" > ~/.ssh/njuknow_known_hosts
          cat > ~/.ssh/njuknow_deploy_config <<EOF
          Host njuknow-production
            HostName ${SERVER_HOST}
            Port ${PORT}
            User ${USER}
            IdentityFile ~/.ssh/njuknow_deploy_key
            IdentitiesOnly yes
            BatchMode yes
            StrictHostKeyChecking yes
            UserKnownHostsFile ~/.ssh/njuknow_known_hosts
          EOF

      - name: Upload artifact and deploy script
        env:
          RUN_DB_MIGRATIONS: ${{ inputs.run_migrations && '1' || '0' }}
        run: |
          set -euo pipefail
          SSH_CONFIG="$HOME/.ssh/njuknow_deploy_config"

          scp -F "${SSH_CONFIG}" "${ARTIFACT}" "${ARTIFACT}.sha256" njuknow-production:/tmp/
          ssh -F "${SSH_CONFIG}" njuknow-production "cd /tmp && sha256sum -c '${ARTIFACT}.sha256' && sudo -n /usr/local/sbin/njuknow-deploy '/tmp/${ARTIFACT}' '${RELEASE_NAME}' '${RUN_DB_MIGRATIONS}'"

      - name: Verify public pages
        run: |
          set -euo pipefail
          curl -fsS https://njuknow.xyz/login >/dev/null
          curl -fsS https://njuknow.xyz/knowledge >/dev/null

      - name: Remove temporary SSH credentials
        if: always()
        run: rm -f ~/.ssh/njuknow_deploy_key ~/.ssh/njuknow_deploy_config ~/.ssh/njuknow_known_hosts
